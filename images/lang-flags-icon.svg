<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- UA -->
  <symbol id="flag-ua" viewBox="0 0 24 24">
    <rect width="24" height="12" fill="#0057B7"/>
    <rect y="12" width="24" height="12" fill="#FFD700"/>
  </symbol>

  <!-- PL -->
  <symbol id="flag-pl" viewBox="0 0 24 24">
    <rect width="24" height="12" fill="#FFFFFF"/>
    <rect y="12" width="24" height="12" fill="#DC143C"/>
  </symbol>

  <!-- EN (акуратний мінімалістичний UK) -->
  <symbol id="flag-en" viewBox="0 0 24 24">
    <rect width="24" height="24" fill="#012169"/>
    
    <!-- White cross -->
    <rect x="9" width="6" height="24" fill="#FFFFFF"/>
    <rect y="9" width="24" height="6" fill="#FFFFFF"/>
    
    <!-- Red cross -->
    <rect x="10" width="4" height="24" fill="#C8102E"/>
    <rect y="10" width="24" height="4" fill="#C8102E"/>
  </symbol>

</svg>
