<!doctype html>
<html
  class="page"
  lang="en"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <!-- <link
      rel="stylesheet"
      href="css/style.css"
    /> -->
    <link
      rel="stylesheet"
      href="css/styles.css"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Math&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon shortcut"
      href="images/logo.svg"
      type="image/svg+xml"
    />
    <title>Simple Math</title>
  </head>

  <body class="page__body">
    <header class="header">
      <div class="top-bar">
        <svg
          class="top-bar__icon top-bar__icon--logo"
          xmlns="http://www.w3.org/2000/svg"
        >
          <use href="./images/logo.svg" />
        </svg>
        <h1 class="top-bar__title">Simple Math</h1>
        <div class="top-bar__buttons">
          <button
            class="top-bar__btn"
            id="gameMenuToggle"
            aria-expanded="false"
            aria-controls="gameMenu"
          >
            <svg class="top-bar__icon">
              <use href="./images/icon-burger-menu.svg#icon-menu"></use>
            </svg>
          </button>
          <button
            class="top-bar__btn"
            id="langMenuToggle"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="langMenu"
          >
            <svg
              class="top-bar__icon"
              viewBox="0 0 24 24"
            >
              <use href="./images/icon-lang.svg#icon-lang" />
            </svg>
          </button>
        </div>
      </div>
      <aside
        id="gameMenu"
        class="menu"
      >
        <nav class="menu__nav">
          <ul class="menu__list">
            <li
              class="menu__item menu__item--mode"
              data-type="mode"
              data-mode="addition"
              data-text="виконай додавання"
            >
              <span class="menu__icon">+</span>
              <span class="menu__text">Додавання</span>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-type="mode"
              data-mode="subtraction"
              data-text="виконай віднімання"
            >
              <span class="menu__icon">−</span>
              <span class="menu__text">Віднімання</span>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-type="mode"
              data-mode="multiplication"
              data-text="виконай множення"
            >
              <span class="menu__icon">×</span>
              <span class="menu__text">Множення</span>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-type="mode"
              data-mode="division"
              data-text="виконай ділення"
            >
              <span class="menu__icon">÷</span>
              <span class="menu__text">Ділення</span>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-type="mode"
              data-mode="make10"
              data-text="утвори 10"
            >
              <span class="menu__icon">🎯</span>
              <span class="menu__text">Утвори 10</span>
            </li>
          </ul>
        </nav>
      </aside>
      <aside
        class="menu"
        id="langMenu"
      >
        <nav class="menu__nav">
          <ul
            class="menu__list"
            role="listbox"
          >
            <li
              class="menu__item menu__item--lang"
              role="option"
              data-type="lang"
              data-lang="uk"
            >
              UA
            </li>
            <li
              class="menu__item menu__item--lang"
              role="option"
              data-type="lang"
              data-lang="en"
            >
              EN
            </li>
            <li
              class="menu__item menu__item--lang"
              role="option"
              data-type="lang"
              data-lang="pl"
            >
              PL
            </li>
          </ul>
        </nav>
      </aside>
    </header>
    <main class="main">
      <div class="game">
        <div class="game__container game__container--start">
          <h2 class="game__title">вибери режим:</h2>
          <aside
            id="startMenu"
            class="menu game__start-menu open"
          >
            <nav class="menu__nav">
              <ul class="menu__list">
                <li
                  class="menu__item menu__item--mode"
                  data-type="mode"
                  data-mode="addition"
                  data-text="виконай додавання"
                >
                  <span class="menu__icon">+</span>
                  <span class="menu__text">Додавання</span>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-type="mode"
                  data-mode="subtraction"
                  data-text="виконай віднімання"
                >
                  <span class="menu__icon">−</span>
                  <span class="menu__text">Віднімання</span>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-type="mode"
                  data-mode="multiplication"
                  data-text="виконай множення"
                >
                  <span class="menu__icon">×</span>
                  <span class="menu__text">Множення</span>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-type="mode"
                  data-mode="division"
                  data-text="виконай ділення"
                >
                  <span class="menu__icon">÷</span>
                  <span class="menu__text">Ділення</span>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-type="mode"
                  data-mode="make10"
                  data-text="утвори 10"
                >
                  <span class="menu__icon">🎯</span>
                  <span class="menu__text">Утвори 10</span>
                </li>
              </ul>
            </nav>
          </aside>
        </div>
        <div class="game__container game__container--play hidden">
          <div class="game__box game__box--first"></div>
          <div class="game__box game__box--operator">×</div>
          <div class="game__box game__box--second"></div>
          <div class="game__box game__box--equals">=</div>
          <div class="game__box game__box--result"></div>
          <input
            class="game__input hidden"
            type="text"
            name="game-answer"
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            autofocus
          />
        </div>
        <div class="game__container game__container--tips hidden">
          <div class="game__box game__box--tip"></div>
          <div class="game__box game__box--tip"></div>
          <div class="game__box game__box--tip"></div>
        </div>
      </div>
    </main>
    <!-- <script src="js/script.js"></script> -->
    <script
      type="module"
      src="js/game.js"
    ></script>
  </body>
</html>
