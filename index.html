<!doctype html>
<html
  class="page"
  lang="en"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="css/styles.css"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Math&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon shortcut"
      href="images/logo.svg"
      type="image/svg+xml"
    />
    <title>Simple Math</title>
  </head>

  <body class="page__body">
    <header class="header">
      <div class="top-bar">
        <div class="top-bar__buttons">
          <button
            id="settingsMenuToggle"
            class="top-bar__btn"
          >
            <svg class="top-bar__icon top-bar__icon--settings">
              <use href="./images/icon-gear.svg#gear-icon"></use>
            </svg>
          </button>
          <button class="top-bar__btn">
            <div class="theme-switcher"></div>
          </button>
        </div>
        <h1 class="top-bar__title">Simple Math</h1>
        <div class="top-bar__buttons">
          <button
            class="top-bar__btn unvisible"
            id="gameMenuToggle"
            aria-expanded="false"
            aria-controls="gameMenu"
            aria-label="Game modes"
            data-i18n="menu.gameModes"
            data-i18n-attr="aria-label"
          >
            <svg class="top-bar__icon">
              <use href="./images/icon-burger-menu.svg#icon-menu"></use>
            </svg>
          </button>
          <button
            class="top-bar__btn"
            id="langMenuToggle"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="langMenu"
            aria-label="Select language"
            data-i18n="menu.languages"
            data-i18n-attr="aria-label"
          ></button>
        </div>
      </div>
      <aside
        id="settingsMenu"
        class="menu menu--settings"
      >
        <div class="menu__wrapper">
          <section class="settings">
            <details
              class="settings__group"
            >
              <summary
                class="settings__title"
                data-i18n="settings.ranges.title"
              ></summary>

              <div class="settings__content">
                <div class="ranges">
                  <div class="ranges__row">
                    <span
                      class="ranges__mode"
                      data-i18n="modes.addition.name"
                    ></span>
                    <label>
                      <span class="detached">min</span>
                      <input
                        name="additionMin"
                        type="text"
                        class="ranges__input ranges__input--min"
                        placeholder="min"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="addition"
                        data-typename="min"
                      />
                    </label>
                    <span>–</span>
                    <label>
                      <span class="detached">max</span>
                      <input
                        name="additionMax"
                        type="text"
                        class="ranges__input ranges__input--max"
                        placeholder="max"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="addition"
                        data-typename="max"
                      />
                    </label>
                  </div>

                  <div class="ranges__row">
                    <span
                      class="ranges__mode"
                      data-i18n="modes.subtraction.name"
                    ></span>
                    <label>
                      <span class="detached">min</span>
                      <input
                        name="subtractionMin"
                        type="text"
                        class="ranges__input ranges__input--min"
                        placeholder="min"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="subtraction"
                        data-typename="min"
                      />
                    </label>
                    <span>–</span>
                    <label>
                      <span class="detached">max</span>
                      <input
                        name="subtractionMax"
                        type="text"
                        class="ranges__input ranges__input--max"
                        placeholder="max"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="subtraction"
                        data-typename="max"
                      />
                    </label>
                  </div>

                  <div class="ranges__row">
                    <span
                      class="ranges__mode"
                      data-i18n="modes.multiplication.name"
                    ></span>
                    <label>
                      <span class="detached">min</span>
                      <input
                        name="multiplicationMin"
                        type="text"
                        class="ranges__input ranges__input--min"
                        placeholder="min"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="multiplication"
                        data-typename="min"
                      />
                    </label>
                    <span>–</span>
                    <label>
                      <span class="detached">max</span>
                      <input
                        name="multiplicationMax"
                        type="text"
                        class="ranges__input ranges__input--max"
                        placeholder="max"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="multiplication"
                        data-typename="max"
                      />
                    </label>
                  </div>

                  <div class="ranges__row">
                    <span
                      class="ranges__mode"
                      data-i18n="modes.division.name"
                    ></span>
                    <label>
                      <span class="detached">min</span>
                      <input
                        name="divisionMin"
                        type="text"
                        class="ranges__input ranges__input--min"
                        placeholder="min"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="division"
                        data-typename="min"
                      />
                    </label>
                    <span>–</span>
                    <label>
                      <span class="detached">max</span>
                      <input
                        name="divisionMax"
                        type="text"
                        class="ranges__input ranges__input--max"
                        placeholder="max"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="division"
                        data-typename="max"
                      />
                    </label>
                  </div>

                  <div class="ranges__row">
                    <span
                      class="ranges__mode"
                      data-i18n="modes.make10.name"
                    ></span>
                    <label>
                      <span class="detached">min</span>
                      <input
                        name="make10Min"
                        type="text"
                        class="ranges__input ranges__input--min"
                        placeholder="min"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="make10"
                        data-typename="min"
                      />
                    </label>
                    <span>–</span>
                    <label>
                      <span class="detached">max</span>
                      <input
                        name="make10Max"
                        type="text"
                        class="ranges__input ranges__input--max"
                        placeholder="max"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="make10"
                        data-typename="max"
                      />
                    </label>
                  </div>

                  <div class="ranges__row">
                    <span
                      class="ranges__mode"
                      data-i18n="modes.compare.name"
                    ></span>
                    <label>
                      <span class="detached">min</span>
                      <input
                        name="compareMin"
                        type="text"
                        class="ranges__input ranges__input--min"
                        placeholder="min"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="compare"
                        data-typename="min"
                      />
                    </label>
                    <span>–</span>
                    <label>
                      <span class="detached">max</span>
                      <input
                        name="compareMax"
                        type="text"
                        class="ranges__input ranges__input--max"
                        placeholder="max"
                        inputmode="numeric"
                        pattern="^\d+$"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-modename="compare"
                        data-typename="max"
                      />
                    </label>
                  </div>
                  <!-- <div class="ranges__row"> -->
                    <button class="ranges__row ranges__row--reset" data-i18n="settings.ranges.reset"></button>
                  <!-- </div> -->
                </div>
              </div>
            </details>

            <details class="settings__group">
              <summary
                class="settings__title"
                data-i18n="settings.langs.title"
              ></summary>

              <div class="settings__content">
                <div class="langs">
                  <button class="langs__row" data-lang="uk">
                    <span
                      class="langs__name"
                      data-i18n="settings.langs.names.ua"
                    ></span>
                  </button>
                  <button class="langs__row" data-lang="en">
                    <span
                      class="langs__name"
                      data-i18n="settings.langs.names.en"
                    ></span>
                  </button>
                  <button class="langs__row" data-lang="pl">
                    <span
                      class="langs__name"
                      data-i18n="settings.langs.names.pl"
                    ></span>
                  </button>
                </div>
              </div>
            </details>
          </section>
        </div>
      </aside>
      <aside
        id="gameMenu"
        class="menu"
      >
        <nav class="menu__nav">
          <ul class="menu__list">
            <li
              class="menu__item menu__item--mode"
              data-mode="addition"
            >
              <div class="menu__item-block">
                <span class="menu__icon">+</span>
                <span
                  class="menu__text"
                  data-i18n="modes.addition.name"
                ></span>
              </div>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-mode="subtraction"
            >
              <div class="menu__item-block">
                <span class="menu__icon">−</span>
                <span
                  class="menu__text"
                  data-i18n="modes.subtraction.name"
                ></span>
              </div>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-mode="multiplication"
            >
              <div class="menu__item-block">
                <span class="menu__icon">×</span>
                <span
                  class="menu__text"
                  data-i18n="modes.multiplication.name"
                ></span>
              </div>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-mode="division"
            >
              <div class="menu__item-block">
                <span class="menu__icon">÷</span>
                <span
                  class="menu__text"
                  data-i18n="modes.division.name"
                ></span>
              </div>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-mode="make10"
            >
              <div class="menu__item-block">
                <svg
                  class="menu__icon"
                  viewBox="0 0 24 24"
                >
                  <use href="./images/10.svg" />
                </svg>
                <span
                  class="menu__text"
                  data-i18n="modes.make10.name"
                ></span>
              </div>
            </li>
            <li
              class="menu__item menu__item--mode"
              data-mode="compare"
            >
              <div class="menu__item-block">
                <svg
                  class="menu__icon"
                  viewBox="0 0 24 24"
                >
                  <use href="./images/compare.svg" />
                </svg>
                <span
                  class="menu__text"
                  data-i18n="modes.compare.name"
                ></span>
              </div>
            </li>
          </ul>
        </nav>
      </aside>
      <aside
        class="menu"
        id="langMenu"
        role="presentation"
      >
        <nav class="menu__nav">
          <ul
            class="menu__list"
            role="listbox"
          >
            <li
              class="menu__item menu__item--lang"
              role="option"
              aria-selected="false"
              data-lang="uk"
            >
              <div class="menu__item-block">
                <svg class="menu__icon">
                  <use href="./images/lang-flags-icon.svg#flag-ua"></use>
                </svg>
                <span class="menu__text">UA</span>
              </div>
            </li>
            <li
              class="menu__item menu__item--lang"
              role="option"
              aria-selected="false"
              data-lang="en"
            >
              <div class="menu__item-block">
                <svg class="menu__icon">
                  <use href="./images/lang-flags-icon.svg#flag-en"></use>
                </svg>
                <span class="menu__text">EN</span>
              </div>
            </li>
            <li
              class="menu__item menu__item--lang"
              role="option"
              aria-selected="false"
              data-lang="pl"
            >
              <div class="menu__item-block">
                <svg class="menu__icon">
                  <use href="./images/lang-flags-icon.svg#flag-pl"></use>
                </svg>
                <span class="menu__text">PL</span>
              </div>
            </li>
          </ul>
        </nav>
      </aside>
    </header>
    <main class="main">
      <div class="game">
        <div class="game__container game__container--start">
          <h2
            class="game__title"
            data-i18n="modeTitle"
          ></h2>
          <aside
            id="startMenu"
            class="menu game__start-menu open"
          >
            <nav class="menu__nav">
              <ul class="menu__list">
                <li
                  class="menu__item menu__item--mode"
                  data-mode="addition"
                >
                  <div class="menu__item-block">
                    <span class="menu__icon">+</span>
                    <span
                      class="menu__text"
                      data-i18n="modes.addition.name"
                    ></span>
                  </div>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-mode="subtraction"
                >
                  <div class="menu__item-block">
                    <span class="menu__icon">−</span>
                    <span
                      class="menu__text"
                      data-i18n="modes.subtraction.name"
                    ></span>
                  </div>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-mode="multiplication"
                >
                  <div class="menu__item-block">
                    <span class="menu__icon">×</span>
                    <span
                      class="menu__text"
                      data-i18n="modes.multiplication.name"
                    ></span>
                  </div>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-mode="division"
                >
                  <div class="menu__item-block">
                    <span class="menu__icon">÷</span>
                    <span
                      class="menu__text"
                      data-i18n="modes.division.name"
                    ></span>
                  </div>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-mode="make10"
                >
                  <div class="menu__item-block">
                    <svg
                      class="menu__icon"
                      viewBox="0 0 24 24"
                    >
                      <use href="./images/10.svg" />
                    </svg>
                    <span
                      class="menu__text"
                      data-i18n="modes.make10.name"
                    ></span>
                  </div>
                </li>
                <li
                  class="menu__item menu__item--mode"
                  data-mode="compare"
                >
                  <div class="menu__item-block">
                    <svg
                      class="menu__icon"
                      viewBox="0 0 24 24"
                    >
                      <use href="./images/compare.svg" />
                    </svg>
                    <span
                      class="menu__text"
                      data-i18n="modes.compare.name"
                    ></span>
                  </div>
                </li>
              </ul>
            </nav>
          </aside>
        </div>
        <div class="game__container game__container--play hidden">
          <div class="game__box game__box--first"></div>
          <div class="game__box game__box--operator">×</div>
          <div class="game__box game__box--second"></div>
          <div class="game__box game__box--equals">=</div>
          <div class="game__box game__box--result"></div>
          <input
            class="game__input hidden"
            type="text"
            name="game-answer"
            inputmode="text"
            pattern="[0-9>&lt;=]+"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          />
        </div>
        <div
          class="game__container game__container--tips hidden"
          data-i18n="chooseAnswer"
          data-i18n-attr="css-var"
          data-css-var="--tips-title"
        >
          <div class="game__box game__box--tip"></div>
          <div class="game__box game__box--tip"></div>
          <div class="game__box game__box--tip"></div>
        </div>
      </div>
    </main>
    <!-- <script src="js/script.js"></script> -->
    <script
      type="module"
      src="js/game.js"
    ></script>
  </body>
</html>
